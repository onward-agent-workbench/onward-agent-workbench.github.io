<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#11111b"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGradient)"/>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="none" stroke="url(#purpleGradient)" stroke-width="3" opacity="0.5"/>

  <g filter="url(#glow)" opacity="0.6">
    <line x1="100" y1="160" x2="280" y2="160" stroke="#a855f7" stroke-width="8" stroke-linecap="round"/>
    <line x1="100" y1="256" x2="240" y2="256" stroke="#a855f7" stroke-width="8" stroke-linecap="round"/>
    <line x1="100" y1="352" x2="280" y2="352" stroke="#a855f7" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g filter="url(#glow)">
    <path d="M 220 256
             L 380 256
             L 380 180
             L 440 256
             L 380 332
             L 380 256"
          fill="url(#purpleGradient)"
          stroke="none"/>
  </g>

  <path d="M 240 256
           L 380 256
           L 380 200
           L 420 256"
        fill="none"
        stroke="#ffffff"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.3"/>

  <rect x="96" y="240" width="4" height="32" fill="#a855f7" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </rect>
</svg>
